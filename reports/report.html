<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEVLOG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgb(13, 13, 13);
      color: rgb(200, 200, 200);
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(13px, 1.6vw, 15px);
      line-height: 1.6;
      padding: 5vh 3vw;
      min-height: 100vh;
    }
    .wrap {
      width: 100%;
    }
    .hdr {
      border: 1px solid rgb(51, 51, 51);
      padding: clamp(14px, 3vw, 24px);
      margin-bottom: clamp(20px, 4vw, 32px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hdr h1{
      color: rgb(52, 211, 153);
      font-size: clamp(22px, 5vw, 32px);
      font-weight: normal;
      letter-spacing: 3px;
    }
    .hdr h1.cur {
      display: inline-block;
      width: 8px;
      background: #34d399;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .ftr {
      border-top: 1px solid #1a1a1a;
      padding-top: 16px;
      color: #333;
      font-size: clamp(10px, 1.1vw, 11px);
      text-align: center;
      margin-top: clamp(20px, 4vw, 32px);
    }

    .ftr a {
      color: #555;
      text-decoration: none;
    }

    .ftr a:hover { color: #c8860a; }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="hdr">
      <h1>&gt; DEVLOG<span class="cur">&nbsp;</span></h1>
    </div>

    <div class="ftr">
      devlog v1.0 &middot; <a href="https://github.com/anshrjpt/DEV-LOG">github</a> 
      <a href="https://github.com/mishika-agarwal-1111">github_mishi</a>
    </div>

  </div>
</body>
</html>
