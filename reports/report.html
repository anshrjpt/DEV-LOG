<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevLog — Report</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #08080d;
    --bg2:      #0e0e18;
    --bg3:      #131320;
    --bg4:      #1a1a2e;
    --border:   #1e1e35;
    --border2:  #2a2a50;
    --purple:   #9b6dff;
    --purple2:  #7c4fe0;
    --purple3:  #c4a0ff;
    --purple4:  #e8d8ff;
    --glow:     rgba(155,109,255,0.18);
    --gray:     #5a5a78;
    --gray2:    #8888a8;
    --light:    #ccc8e8;
    --white:    #eeeaff;
    --green:    #4fffb0;
    --red:      #ff6b8a;
    --yellow:   #ffd166;
    --cyan:     #67e8f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* background */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .bg-blobs {
    background:
      radial-gradient(ellipse 70% 50% at 15% -5%,  rgba(120,60,220,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 90% 110%, rgba(80,30,200,0.15)  0%, transparent 55%),
      radial-gradient(ellipse 30% 30% at 60% 40%,  rgba(155,109,255,0.05) 0%, transparent 60%);
  }

  .bg-dots {
    background-image: radial-gradient(rgba(155,109,255,0.18) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black 20%, transparent 80%);
  }

  .bg-scan {
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
  }

  .bg-grain {
    opacity: 0.022;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /*layout*/
  .wrap {
    width: 100%;
    padding: 0 3vw 100px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    padding: 60px 0 48px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  .header-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--purple) 0%, rgba(155,109,255,0.3) 30%, transparent 70%);
    box-shadow: 0 0 20px rgba(155,109,255,0.4);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 4.2rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -4px;
    line-height: 0.9;
    text-shadow:
      0 0 60px rgba(155,109,255,0.35),
      0 0 120px rgba(155,109,255,0.12);
  }

  h1 .hollow {
    color: transparent;
    -webkit-text-stroke: 1.5px var(--purple3);
  }

  .header-chips {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 7px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.52rem;
    color: var(--gray2);
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    background: rgba(14,14,24,0.8);
    backdrop-filter: blur(8px);
  }

  .chip .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

</style>
</head>
<body>


<div class="bg-layer bg-blobs"></div>
<div class="bg-layer bg-dots"></div>
<div class="bg-layer bg-scan"></div>
<div class="bg-layer bg-grain"></div>

<div class="wrap">
<!-- HEADER -->
  <div class="header">
    <div>
      <h1>Dev<span class="hollow">Log</span></h1>
    </div>
    <div class="header-chips">
      <div class="chip"><span class="live-dot"></span> C++ / CLI</div>
      <div class="chip"><span style="color:var(--purple3)">24</span> &nbsp;entries</div>
      <div class="chip"><span style="color:var(--green)">7</span> &nbsp;day streak</div>
    </div>
    <div class="header-line"></div>
  </div>
</div>

</body>
</html>
